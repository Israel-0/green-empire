version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: green-empire-db
    environment:
      POSTGRES_USER: greenempire
      POSTGRES_PASSWORD: greenempire123
      POSTGRES_DB: green_empire
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: green-empire-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@greenempire.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  pgdata:
